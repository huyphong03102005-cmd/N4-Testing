<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống Quản lý Khách sạn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- Cột trái: Logo --- */
        .left-panel {
            flex: 1;
            background-color: #D1C19F;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .left-panel img {
            width: 88%;
            max-width: 420px;
            object-fit: contain;
        }

        /* --- Cột phải: Form đăng nhập --- */
        .right-panel {
            flex: 1;
            background-color: #e8dcc8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 80%;
            max-width: 380px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #222;
            margin-bottom: 7px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 10px 60px 10px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            background-color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #7a9e7e;
        }

        .btn-show-pw {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            font-weight: 600;
        }

        /* --- Dòng ghi nhớ + quên mật khẩu --- */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #333;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: #4a7c59;
            cursor: pointer;
        }

        .forgot-pw {
            font-size: 13px;
            color: #4a7c59;
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-pw:hover {
            text-decoration: underline;
        }

        /* --- Nút đăng nhập --- */
        .btn-login {
            width: 100%;
            padding: 13px;
            background-color: #4a7c59;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-login:hover {
            background-color: #3d6a4b;
        }
    </style>
</head>

<body>

    <!-- Cột trái: Logo -->
    <div class="left-panel">
        <img src="./Picture/Logo_signin.png" alt="Logo CmeSin">
    </div>

    <!-- Cột phải: Form đăng nhập -->
    <div class="right-panel">
        <div class="login-box">
            <h1 class="login-title">Đăng nhập</h1>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" required placeholder="">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" required placeholder="">
                        <button class="btn-show-pw" onclick="togglePassword()" type="button">Hiện</button>
                    </div>
                </div>

                <!-- Hiển thị lỗi nếu có -->
                <div th:if="${error}"
                    style="color: #de5e5e; font-size: 13px; margin-bottom: 15px; font-weight: 600; text-align: center;">
                    <span th:text="${error}"></span>
                </div>

                <!-- Hiển thị thành công nếu có -->
                <div th:if="${success}"
                    style="color: #4a7c59; font-size: 13px; margin-bottom: 15px; font-weight: 600; text-align: center;">
                    <span th:text="${success}"></span>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        Ghi nhớ đăng nhập
                    </label>
                    <a href="/forgot-password" class="forgot-pw">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-login">Đăng nhập</button>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            const pw = document.getElementById('password');
            const btn = document.querySelector('.btn-show-pw');
            if (pw.type === 'password') {
                pw.type = 'text';
                btn.textContent = 'Ẩn';
            } else {
                pw.type = 'password';
                btn.textContent = 'Hiện';
            }
        }
    </script>

</body>

</html>
