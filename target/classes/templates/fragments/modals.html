<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="logout" class="logout-popup" id="logoutPopup">
        <p>Bạn muốn đăng xuất?</p>
        <div class="logout-popup-actions">
            <button class="btn-logout-cancel" onclick="toggleLogoutPopup()">Hủy</button>
            <button class="btn-logout-confirm" th:onclick="|window.location.href='/login'|">Xác nhận</button>
        </div>
    </div>

    <div th:fragment="user-info" class="user-info-overlay" id="userInfoOverlay">
        <div class="user-info-card">
            <h2>Thông tin người dùng</h2>
            <!-- Truncated for brevity, but same content as original base.html -->
             <div class="user-info-footer" id="userInfoFooter">
                <button class="btn-user-cancel" onclick="closeUserInfo()">HỦY</button>
                <button class="btn-user-save" onclick="showSaveSuccess()">LƯU</button>
            </div>
        </div>
    </div>
</body>
</html>
