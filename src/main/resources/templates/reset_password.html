<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Bước 3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        .left-panel {
            flex: 1;
            background-color: #D1C19F;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .left-panel img {
            width: 88%;
            max-width: 420px;
            object-fit: contain;
        }

        .right-panel {
            flex: 1;
            background-color: #e8dcc8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 80%;
            max-width: 380px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
            text-align: center;
        }

        .login-subtitle {
            font-size: 14px;
            color: #555;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #222;
            margin-bottom: 7px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            background-color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #7a9e7e;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background-color: #4a7c59;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #3d6a4b;
        }

        .error-msg {
            color: #de5e5e;
            font-size: 13px;
            margin-bottom: 15px;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <img src="/Picture/Logo_signin.png" alt="Logo">
    </div>
    <div class="right-panel">
        <div class="login-box">
            <h1 class="login-title">Đặt lại mật khẩu</h1>
            <p class="login-subtitle">Vui lòng nhập mật khẩu mới cho tài khoản của bạn</p>

            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" name="email" th:value="${email}">
                <div class="form-group">
                    <label for="password">Mật khẩu mới</label>
                    <input type="password" id="password" name="password" required placeholder="********">
                </div>

                <div class="form-group">
                    <label for="confirm-password">Xác nhận mật khẩu</label>
                    <input type="password" id="confirm-password" name="confirmPassword" required placeholder="********">
                </div>

                <div th:if="${error}" class="error-msg">
                    <span th:text="${error}"></span>
                </div>

                <button type="submit" class="btn-submit">Cập nhật mật khẩu</button>
            </form>
        </div>
    </div>
</body>
</html>
