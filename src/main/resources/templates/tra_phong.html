<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::content})}">

<head th:fragment="head">
    <title>Hệ thống Quản lý Khách sạn - Trả phòng</title>
</head>

<body>
    <div th:fragment="content">
        <style>
            /* --- Ghi đè Scroll theo chuẩn Dashboard --- */
            .main-content {
                overflow: hidden !important;
                display: flex;
                flex-direction: column;
                height: 100vh;
                flex: 1;
                min-height: 0;
            }

            /* --- CSS riêng của trang Trả Phòng --- */
            .layout-grid {
                display: flex;
                gap: 30px;
                flex: 1;
                height: calc(100vh - 280px);
                /* Tránh bị che bởi Taskbar */
                overflow: hidden;
            }

            .search-room-wrapper {
                position: relative;
                width: 100%;
            }

            .search-room-wrapper i {
                position: absolute;
                left: 15px;
                top: 50%;
                transform: translateY(-50%);
                color: #888;
            }

            .search-room-wrapper input {
                width: 100%;
                padding: 10px 15px 10px 40px;
                border-radius: 20px;
                border: 1px solid #ddd;
                outline: none;
                font-size: 14px;
                background: #fff;
                transition: 0.2s;
            }

            .search-room-wrapper input:focus {
                border-color: #c0ab7b;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            }

            .map-section {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
                padding-bottom: 20px;
                padding-right: 15px;
            }

            .map-section-title {
                font-size: 24px;
                font-weight: bold;
                color: #111;
                margin-bottom: 30px;
                flex-shrink: 0;
            }

            .floor-group {
                margin-bottom: 40px;
            }

            .floor-title {
                font-size: 16px;
                font-weight: bold;
                color: #111;
                margin-bottom: 20px;
            }

            .floor-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 25px;
            }

            .map-room-card {
                border-radius: 12px;
                padding: 25px 15px;
                text-align: center;
                cursor: pointer;
                transition: transform 0.2s, box-shadow 0.2s;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 140px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
                border: 1px solid rgba(0, 0, 0, 0.05);
            }

            .map-room-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
                opacity: 0.8;
            }

            .map-room-name {
                font-weight: bold;
                font-size: 16px;
                color: #111;
                margin-bottom: 12px;
            }

            .map-room-status {
                font-size: 15px;
                color: #333;
                margin-bottom: 8px;
            }

            .map-room-customer {
                font-size: 14px;
                color: #111;
                margin-bottom: 6px;
            }

            .map-room-date {
                font-size: 13px;
                color: #555;
                font-weight: 500;
            }

            .bg-sudung {
                background-color: #f79e9a;
            }

            .detail-section {
                flex: 1;
                display: flex;
                flex-direction: column;
                padding-bottom: 20px;
                padding-right: 15px;
                overflow-y: auto;
            }

            .btn-back-wrapper {
                margin-bottom: 15px;
                flex-shrink: 0;
            }

            .btn-back {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                background: transparent;
                border: none;
                font-size: 16px;
                font-weight: bold;
                color: #d35400;
                cursor: pointer;
                text-decoration: none;
                padding: 0;
            }

            .btn-back:hover {
                text-decoration: underline;
            }

            .room-info-card {
                background: white;
                border-radius: 8px;
                padding: 25px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
                margin-bottom: 15px;
            }

            .room-title {
                font-size: 20px;
                font-weight: bold;
                margin-bottom: 15px;
                display: flex;
                align-items: center;
                gap: 15px;
                color: #222;
            }

            .room-status {
                font-size: 14px;
                color: #555;
                margin-bottom: 15px;
                display: flex;
                align-items: center;
                gap: 15px;
            }

            .status-badge {
                padding: 4px 15px;
                border-radius: 15px;
                font-size: 12px;
                font-weight: 600;
                color: #111;
            }

            .room-time {
                font-size: 14px;
                color: #444;
                margin-bottom: 25px;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .room-total {
                display: flex;
                justify-content: space-between;
                font-size: 15px;
                font-weight: 600;
                padding-top: 15px;
                border-top: 1px solid #eee;
                color: #333;
            }

            .selected-item {
                background: white;
                border-radius: 8px;
                padding: 20px 25px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 15px;
            }

            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 100;
                display: none;
                justify-content: center;
                align-items: center;
            }

            .popup {
                background: white;
                padding: 40px;
                border-radius: 12px;
                text-align: center;
                width: 400px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            }

            .popup-icon {
                font-size: 60px;
                color: #2ecc71;
                margin-bottom: 20px;
            }

            .popup-title {
                font-size: 24px;
                font-weight: bold;
                margin-bottom: 25px;
                color: #222;
            }

            .popup-btn {
                background: #e74c3c;
                color: white;
                border: none;
                padding: 12px 40px;
                border-radius: 6px;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
            }

            .f-btn-save {
                background: #d1b88a;
                color: #222;
                padding: 12px 35px;
                border-radius: 8px;
                font-weight: bold;
                font-size: 16px;
                cursor: pointer;
                border: none;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
                transition: 0.2s;
            }

            .f-btn-save:hover {
                background: #c0ab7b;
            }
        </style>

        <div class="layout-grid" id="checkoutView">
            <div id="coMapSection" class="map-section" style="width: 100%; border-right: none; padding-right: 0;">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-shrink: 0; max-width: 100%;">
                    <div class="map-section-title" style="margin-bottom: 0;">Sơ đồ phòng (Đang sử dụng)</div>
                    <div class="search-room-wrapper" style="max-width: 400px;">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="coSearchInput" placeholder="Tìm kiếm phòng..."
                            onkeyup="searchCheckoutMap()">
                    </div>
                </div>
                <div id="coMapContainer" style="display: flex; flex-direction: column;"></div>
            </div>

            <div id="coDetailSection" class="detail-section" style="display: none; width: 100%;">
                <div class="btn-back-wrapper">
                    <button class="btn-back" onclick="selectCheckoutRoom(null)">
                        <i class="fa-solid fa-arrow-left"></i> Quay lại Sơ đồ
                    </button>
                </div>
                <div style="display: flex; gap: 30px; flex: 1; overflow: hidden;">
                    <div style="flex: 1.2; display: flex; flex-direction: column; overflow-y: auto; padding-right: 25px;"
                        id="coLeftPanel"></div>
                    <div style="flex: 0.8; max-width: 500px; overflow-y: auto; display: block;" id="coRightPanel"></div>
                </div>
            </div>
        </div>

        <div class="overlay" id="invoicePopup">
            <div
                style="background: #fffdf5; padding: 40px; border-radius: 12px; width: 620px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); position: relative; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                <div style="text-align: center; margin-bottom: 25px;">
                    <img src="./Picture/bill_logo_logo.png" alt="Logo"
                        style="width: 70px; height: 70px; object-fit: contain;">
                    <h2 style="color: #d35400; font-size: 26px; font-weight: bold; margin-top: 8px;">CamFusion House
                    </h2>
                </div>
                <h3
                    style="color: #d35400; border-bottom: 2px solid #eaddcf; padding-bottom: 5px; margin-bottom: 15px; font-size: 20px;">
                    Thông tin khách hàng</h3>
                <table
                    style="width: 100%; border-collapse: collapse; margin-bottom: 25px; font-size: 16px; text-align: left; table-layout: fixed;">
                    <colgroup>
                        <col style="width: 50%;">
                        <col style="width: 25%;">
                        <col style="width: 25%;">
                    </colgroup>
                    <thead>
                        <tr>
                            <th style="padding-bottom:5px; color: #111;">Tên khách</th>
                            <th style="padding-bottom:5px; text-align:center; color: #111;">Check-in</th>
                            <th style="padding-bottom:5px; text-align:right; color: #111;">Check-out</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="invCust"
                                style="color:#333; font-weight: normal; padding-top: 5px; word-wrap: break-word;"></td>
                            <td id="invIn"
                                style="text-align:center; color:#333; font-weight: normal; padding-top: 5px;"></td>
                            <td id="invOut"
                                style="text-align:right; color:#333; font-weight: normal; padding-top: 5px;"></td>
                        </tr>
                    </tbody>
                </table>
                <h3
                    style="color: #d35400; border-bottom: 2px solid #eaddcf; padding-bottom: 5px; margin-bottom: 15px; font-size: 20px;">
                    Dịch vụ phòng</h3>
                <table
                    style="width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 16px; text-align: left; table-layout: fixed;">
                    <colgroup>
                        <col style="width: 50%;">
                        <col style="width: 25%;">
                        <col style="width: 25%;">
                    </colgroup>
                    <thead>
                        <tr>
                            <th style="padding-bottom:10px; color: #111;">Tên dịch vụ</th>
                            <th style="padding-bottom:10px; text-align:center; color: #111;">Số lượng</th>
                            <th style="padding-bottom:10px; text-align:right; color: #111;">Giá</th>
                        </tr>
                    </thead>
                    <tbody id="invItemsBody"></tbody>
                </table>
                <div style="border-top: 2px solid #eaddcf; margin-bottom: 15px;"></div>
                <div
                    style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 17px; font-weight: bold;">
                    <span>Tiền phòng:</span><span id="invRoom">0</span>
                </div>
                <div
                    style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 17px; font-weight: bold;">
                    <span>Dịch vụ phòng:</span><span id="invSrv">0</span>
                </div>
                <div
                    style="border-top: 3px double #d35400; padding-top: 15px; display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                    <span style="font-size: 22px; font-weight: bold; color: #d35400; text-transform: uppercase;">Tổng
                        cộng</span>
                    <span id="invTotal" style="font-size: 24px; font-weight: bold; color: #d35400;">0</span>
                </div>
                <div style="text-align: center; margin-top: 30px; font-style: italic; color: #777;">Cảm ơn quý khách đã
                    sử dụng dịch vụ của CamFusion House!</div>
                <div style="margin-top: 40px; display: flex; justify-content: center; gap: 20px;">
                    <button onclick="closeInvoice()"
                        style="background: #999; color: #fff; border: none; padding: 12px 30px; border-radius: 6px; font-weight: bold; cursor: pointer;">ĐÓNG</button>
                    <button onclick="printInvoice()"
                        style="background: #d35400; color: #fff; border: none; padding: 12px 45px; border-radius: 6px; font-weight: bold; cursor: pointer;">IN
                        HÓA ĐƠN</button>
                </div>
            </div>
        </div>

        <div class="overlay" id="printSuccessPopup">
            <div class="popup">
                <div class="popup-icon"><i class="fa-solid fa-print"></i></div>
                <div class="popup-title">Đã gửi lệnh in hóa đơn!</div>
                <button class="popup-btn" onclick="closePrintSuccess()">Xong</button>
            </div>
        </div>

        <script src="shared.js"></script>
        <script th:inline="javascript">
            const formatMoney = (amount) => amount.toLocaleString('vi-VN');

            // Lấy dữ liệu từ Thymeleaf
            let floorsMapped = [[${ floors }]];
            let roomsData = [];

            // Flatten floorsMapped into roomsData for easy search
            Object.values(floorsMapped).forEach(floorRooms => {
                floorRooms.forEach(room => {
                    roomsData.push({
                        id: room.idPhong,
                        name: room.tenPhong,
                        floor: room.floor,
                        status: room.trangThai,
                        customer: room.tenKhachHang,
                        idLuutru: room.idLuutru,
                        date: room.checkInTime ? new Date(room.checkInTime).toLocaleString('vi-VN') : '',
                        date2: room.expectedCheckOutTime ? new Date(room.expectedCheckOutTime).toLocaleString('vi-VN') : '',
                        basePrice: room.giaPhong || 0,
                        items: [] // Will fetch from API when selected
                    });
                });
            });

            let selectedCheckoutRoomId = null;

            document.addEventListener('DOMContentLoaded', () => {
                renderCheckoutMap();
            });

            function searchCheckoutMap() {
                const query = document.getElementById('coSearchInput').value.toLowerCase();
                const floors = document.getElementById('coMapContainer').querySelectorAll('.floor-group');
                floors.forEach(f => {
                    let hasVisible = false;
                    f.querySelectorAll('.map-room-card').forEach(c => {
                        if (c.querySelector('.map-room-name').innerText.toLowerCase().includes(query)) {
                            c.style.display = 'flex';
                            hasVisible = true;
                        } else c.style.display = 'none';
                    });
                    f.style.display = hasVisible ? 'block' : 'none';
                });
            }

            function renderCheckoutMap() {
                const container = document.getElementById('coMapContainer');
                let html = '';

                // Group roomsData by floor if not already
                const floors = [...new Set(roomsData.map(r => r.floor))].sort();

                floors.forEach(floor => {
                    const floorRooms = roomsData.filter(r => r.floor === floor);
                    if (floorRooms.length > 0) {
                        html += `<div class="floor-group"><div class="floor-title">Tầng ${floor}</div><div class="floor-grid">`;
                        floorRooms.forEach(room => {
                            html += `
                                <div class="map-room-card bg-sudung" onclick="selectCheckoutRoom(${room.id})">
                                    <div class="map-room-name">${room.name}</div>
                                    <div class="map-room-status">${room.status}</div>
                                    <div class="map-room-customer">${room.customer || 'N/A'}</div>
                                    <div class="map-room-date">→ ${room.date ? room.date.split(',')[0] : ''}</div>
                                </div>`;
                        });
                        html += `</div></div>`;
                    }
                });
                container.innerHTML = html;
                document.getElementById('coSearchInput').value = '';
            }

            async function selectCheckoutRoom(id) {
                selectedCheckoutRoomId = id;
                if (!id) {
                    document.getElementById('coMapSection').style.display = 'flex';
                    document.getElementById('coDetailSection').style.display = 'none';
                    renderCheckoutMap();
                } else {
                    const room = roomsData.find(r => r.id == id);
                    if (room && room.idLuutru) {
                        try {
                            // Fetch detailed stay info for the specific room selected
                            const resp = await fetch(`/api/tra-phong/stay-details/${room.idLuutru}`);
                            if (!resp.ok) throw new Error("Không thể tải thông tin lưu trú");
                            const stay = await resp.json();

                            if (stay) {
                                // Map items from API
                                room.items = [];
                                if (stay.suDungDichVuList) {
                                    stay.suDungDichVuList.forEach(sd => {
                                        room.items.push({
                                            name: sd.dichVu.tenDichVu,
                                            price: sd.dichVu.donGia,
                                            qty: sd.soluong,
                                            type: 'service',
                                            id: sd.idSudungDv
                                        });
                                    });
                                }
                                if (stay.thietHaiList) {
                                    stay.thietHaiList.forEach(th => {
                                        room.items.push({
                                            name: th.taiSan.tenTaiSan,
                                            price: th.soTienBoiThuong,
                                            qty: 1,
                                            type: 'compensation',
                                            id: th.idThieThai
                                        });
                                    });
                                }
                                room.basePrice = stay.calculatedBasePrice || 0;
                                room.customer = stay.datPhong ? stay.datPhong.tenNguoiDat : 'N/A';
                                room.date = stay.thoiGianCheckinThucTe ? new Date(stay.thoiGianCheckinThucTe).toLocaleString('vi-VN') : '';
                            }
                        } catch (err) {
                            console.error("Lỗi khi tải thông tin chi tiết:", err);
                        }
                    }

                    document.getElementById('coMapSection').style.display = 'none';
                    document.getElementById('coDetailSection').style.display = 'flex';
                    renderCheckoutParams();
                }
            }

            function renderCheckoutParams() {
                const lPanel = document.getElementById('coLeftPanel');
                const rPanel = document.getElementById('coRightPanel');
                const room = roomsData.find(r => r.id === selectedCheckoutRoomId);
                if (!room) return;

                let svHtml = '';
                let cpHtml = '';
                let svTotal = 0;
                let svIdx = 1, cpIdx = 1;

                room.items.forEach(item => {
                    const total = item.price * item.qty;
                    svTotal += total;
                    const row = `
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-size:15px; padding-left:15px;">
                            <span style="flex:1;">${item.type === 'service' ? svIdx : cpIdx}. ${item.type === 'compensation' ? 'Tài sản bồi thường: ' : ''}${item.name}</span>
                            <div style="background:#f0f0f0; padding:2px 10px; border-radius:12px; font-size:13px; color:#555; margin-right:20px; user-select:none;">
                                <span style="cursor:pointer; padding: 0 5px; font-weight:bold;" onclick="changeCheckoutItemQty('${item.name}', '${item.type}', -1)">-</span>
                                ${item.qty < 10 ? '0' + item.qty : item.qty}
                                <span style="cursor:pointer; padding: 0 5px; font-weight:bold;" onclick="changeCheckoutItemQty('${item.name}', '${item.type}', 1)">+</span>
                            </div>
                            <div style="width:100px; text-align:right;">${formatMoney(total)}</div>
                            <i class="fa-regular fa-trash-can" style="color:#aaa; margin-left:15px; cursor:pointer;" title="Xóa mục này" onclick="deleteCheckoutItem('${item.name}', '${item.type}')"></i>
                        </div>`;
                    if (item.type === 'service') { svHtml += row; svIdx++; }
                    else { cpHtml += row; cpIdx++; }
                });

                lPanel.innerHTML = `
                    <div class="room-info-card">
                        <div class="room-title"><i class="fa-regular fa-calendar-check" style="font-size:24px; color:#555;"></i> Phòng ${room.name}</div>
                        <div class="room-status">Trạng thái: <span class="status-badge bg-sudung">${room.status}</span></div>
                        <div class="room-time" style="display:flex; justify-content:space-between;">
                            <div><span style="font-weight:600; color:#333;">Check-in:</span> <span style="background:#f4f4f4; padding:2px 8px; border-radius:4px; font-size:13px;">${room.date || ''} <i class="fa-regular fa-calendar" style="color:#888;"></i></span></div>
                            <div><span style="font-weight:600; color:#333;">Check-out:</span> <span style="background:#f4f4f4; padding:2px 8px; border-radius:4px; font-size:13px;">${room.date2 || ''} <i class="fa-regular fa-calendar" style="color:#888;"></i></span></div>
                        </div>
                        <div class="room-time" style="margin-top: 15px; margin-bottom: 20px;">Số người: 2</div>
                        <div class="room-total" style="border-top:1px solid #ddd; padding-top:15px; color:#666;">
                            Tiền phòng: <span style="font-weight:700; color:#333; border-bottom:1px solid #ccc; padding-bottom:2px;">${formatMoney(room.basePrice)}</span>
                        </div>
                    </div>
                    <div class="room-info-card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                            <span style="font-size:18px; font-weight:bold;">A. Dịch vụ phòng</span>
                            <button style="background:#dcd1c6; border:none; border-radius:12px; padding:6px 15px; font-weight:600; cursor:pointer;" onclick="goToServicePage('service')">+ Thêm dịch vụ</button>
                        </div>
                        ${svHtml || '<i style="color:#999; font-size:14px; padding-left:15px;">Không có dịch vụ phát sinh</i>'}
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; margin-top:35px;">
                            <span style="font-size:18px; font-weight:bold;">B. Bồi thường thiệt hại</span>
                            <button style="background:#dcd1c6; border:none; border-radius:12px; padding:6px 15px; font-weight:600; cursor:pointer;" onclick="goToServicePage('compensation')">+ Thêm tài sản</button>
                        </div>
                        ${cpHtml || '<i style="color:#999; font-size:14px; padding-left:15px;">Không có bồi thường</i>'}
                    </div>
                `;

                rPanel.innerHTML = `
                    <div class="room-info-card" style="padding: 40px; display: flex; flex-direction: column; background:#fffcf5; min-height: 100%;">
                        <div style="display:flex; justify-content:space-between; font-size:18px; margin-bottom:30px; color:#333;">
                            <span>Tiền phòng:</span><span style="color:#222;">${formatMoney(room.basePrice)}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:18px; margin-bottom:30px; color:#333;">
                            <span>Tổng dịch vụ phòng:</span><span style="color:#222;">${formatMoney(svTotal)}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:18px; margin-bottom:30px; color:#333;">
                            <span>Phụ thu:</span><span style="color:#222;">0</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; font-size:22px; font-weight:bold; margin-bottom:20px; color:#111; margin-top:5px;">
                            <span style="text-transform:uppercase;">Tổng tiền</span><span>${formatMoney(room.basePrice + svTotal)}</span>
                        </div>
                        <hr style="border:none; border-top:2px solid #eaddcf; margin: 30px 0;">
                        <div style="font-weight:bold; font-size:18px; margin-bottom:25px; text-transform:uppercase; color:#111;">PHƯƠNG THỨC THANH TOÁN</div>
                        <label style="display:flex; justify-content:space-between; align-items:center; font-size:17px; margin-bottom:20px; cursor:pointer;">
                            <span style="color:#333;">Thanh toán bằng tiền mặt</span>
                            <input type="checkbox" id="cbCash" onchange="toggleCoPayment('cash')" style="width:22px; height:22px; accent-color:#d57e50; cursor:pointer;">
                        </label>
                        <label style="display:flex; justify-content:space-between; align-items:center; font-size:17px; margin-bottom:40px; cursor:pointer;">
                            <span style="color:#333;">Thanh toán bằng QR</span>
                            <input type="checkbox" id="cbQr" onchange="toggleCoPayment('qr')" style="width:22px; height:22px; accent-color:#d57e50; cursor:pointer;">
                        </label>
                        <div style="margin-top:auto;">
                            <button class="f-btn-save" style="width:100%;" onclick="openInvoiceForm()">THANH TOÁN</button>
                        </div>
                    </div>
                `;
            }

            function toggleCoPayment(opt) {
                if (opt === 'cash') {
                    if (document.getElementById('cbCash').checked) document.getElementById('cbQr').checked = false;
                } else {
                    if (document.getElementById('cbQr').checked) document.getElementById('cbCash').checked = false;
                }
            }

            function openInvoiceForm() {
                const cbCash = document.getElementById('cbCash').checked;
                const cbQr = document.getElementById('cbQr').checked;
                if (!cbCash && !cbQr) { alert('Vui lòng chọn 1 phương thức thanh toán!'); return; }

                const room = roomsData.find(r => r.id === selectedCheckoutRoomId);
                document.getElementById('invCust').innerText = room.customer || '';
                document.getElementById('invIn').innerText = room.date ? room.date.split(',')[0] : '';
                document.getElementById('invOut').innerText = room.date2 ? room.date2.split(',')[0] : '';

                let tbody = '';
                let svTotal = 0;
                room.items.forEach(item => {
                    const total = item.price * item.qty;
                    svTotal += total;
                    tbody += `<tr>
                        <td style="padding:10px 0; border-bottom: 1px solid #eee; word-wrap: break-word; font-weight: 500; color: #111;">${item.type === 'compensation' ? 'Tài sản bồi thường: ' : ''}${item.name}</td>
                        <td style="text-align:center; padding:10px 0; border-bottom: 1px solid #eee; font-weight: 600; color: #111;">${item.qty < 10 ? '0' + item.qty : item.qty}</td>
                        <td style="text-align:right; padding:10px 0; border-bottom: 1px solid #eee; font-weight: 600; color: #111;">${formatMoney(total)}</td>
                    </tr>`;
                });
                document.getElementById('invItemsBody').innerHTML = tbody;
                document.getElementById('invRoom').innerText = formatMoney(room.basePrice);
                document.getElementById('invSrv').innerText = formatMoney(svTotal);
                document.getElementById('invTotal').innerText = formatMoney(room.basePrice + svTotal);

                document.getElementById('invoicePopup').style.display = 'flex';
            }

            function closeInvoice() { document.getElementById('invoicePopup').style.display = 'none'; }

            async function printInvoice() {
                const room = roomsData.find(r => r.id == selectedCheckoutRoomId);
                const cbCash = document.getElementById('cbCash').checked;
                const paymentMethod = cbCash ? 'Tiền mặt' : 'Chuyển khoản';

                try {
                    const resp = await fetch('/api/tra-phong/finalize', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            idLuutru: room.idLuutru,
                            paymentMethod: paymentMethod
                        })
                    });

                    if (resp.ok) {
                        document.getElementById('invoicePopup').style.display = 'none';
                        document.getElementById('printSuccessPopup').style.display = 'flex';
                    } else {
                        const err = await resp.text();
                        alert("Lỗi khi thanh toán: " + err);
                    }
                } catch (err) {
                    console.error("Lỗi:", err);
                    alert("Có lỗi xảy ra khi kết nối máy chủ.");
                }
            }

            function closePrintSuccess() {
                document.getElementById('printSuccessPopup').style.display = 'none';
                window.location.reload(); // Reload to refresh room statuses from DB
            }

            function changeCheckoutItemQty(name, type, delta) {
                const room = roomsData.find(r => r.id === selectedCheckoutRoomId);
                if (!room) return;
                const item = room.items.find(i => i.name === name && i.type === type);
                if (item) {
                    item.qty += delta;
                    if (item.qty < 1) item.qty = 1;
                    if (window.sharedData) window.sharedData.saveSharedRooms(roomsData);
                    renderCheckoutParams();
                }
            }

            function deleteCheckoutItem(name, type) {
                const room = roomsData.find(r => r.id === selectedCheckoutRoomId);
                if (!room) return;
                if (confirm(`Bạn có chắc chắn muốn xóa "${name}"?`)) {
                    room.items = room.items.filter(i => !(i.name === name && i.type === type));
                    if (window.sharedData) window.sharedData.saveSharedRooms(roomsData);
                    renderCheckoutParams();
                }
            }

            function goToServicePage(tab) {
                if (selectedCheckoutRoomId) {
                    window.location.href = `/service?roomId=${selectedCheckoutRoomId}&tab=${tab}`;
                } else {
                    window.location.href = `/service?tab=${tab}`;
                }
            }
        </script>
    </div>
</body>

</html>
