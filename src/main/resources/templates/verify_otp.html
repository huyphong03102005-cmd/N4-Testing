<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực OTP - Bước 2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        .left-panel {
            flex: 1;
            background-color: #D1C19F;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .left-panel img {
            width: 88%;
            max-width: 420px;
            object-fit: contain;
        }

        .right-panel {
            flex: 1;
            background-color: #e8dcc8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 80%;
            max-width: 380px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
            text-align: center;
        }

        .login-subtitle {
            font-size: 14px;
            color: #555;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .otp-input {
            width: 45px;
            height: 50px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .otp-input:focus {
            border-color: #4a7c59;
            box-shadow: 0 0 5px rgba(74, 124, 89, 0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background-color: #4a7c59;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #3d6a4b;
        }

        .resend-otp {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #555;
        }

        .resend-otp a {
            color: #4a7c59;
            text-decoration: none;
            font-weight: 600;
        }

        .resend-otp a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: #de5e5e;
            font-size: 13px;
            margin-bottom: 15px;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <img src="/Picture/Logo_signin.png" alt="Logo">
    </div>
    <div class="right-panel">
        <div class="login-box">
            <h1 class="login-title">Nhập mã OTP</h1>
            <p class="login-subtitle">Mã xác thực đã được gửi đến email: <br><strong th:text="${email}"></strong></p>

            <form th:action="@{/verify-otp}" method="post" id="otp-form">
                <input type="hidden" name="email" th:value="${email}">
                <div class="form-group">
                    <input type="text" class="otp-input" maxlength="1" required>
                    <input type="text" class="otp-input" maxlength="1" required>
                    <input type="text" class="otp-input" maxlength="1" required>
                    <input type="text" class="otp-input" maxlength="1" required>
                    <input type="text" class="otp-input" maxlength="1" required>
                    <input type="text" class="otp-input" maxlength="1" required>
                </div>
                <input type="hidden" name="otp" id="otp-value">

                <div th:if="${error}" class="error-msg">
                    <span th:text="${error}"></span>
                </div>

                <button type="submit" class="btn-submit">Xác nhận</button>
            </form>

            <div class="resend-otp">
                Chưa nhận được mã? <a href="#">Gửi lại (60s)</a>
            </div>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.otp-input');
        const otpValue = document.getElementById('otp-value');
        const form = document.getElementById('otp-form');

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }
                if (e.target.value !== '' && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        form.addEventListener('submit', (e) => {
            let value = '';
            inputs.forEach(input => value += input.value);
            otpValue.value = value;
        });
    </script>
</body>
</html>
