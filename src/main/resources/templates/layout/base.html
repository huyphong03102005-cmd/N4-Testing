<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">Hệ thống Quản lý Khách sạn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lora', serif; }
        body { background-color: #f4f4f4; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        #app-container { width: 100%; min-height: 100vh; background-color: #ffffff; display: flex; flex-direction: column; position: relative; }
        .top-bar { height: 60px; display: flex; justify-content: flex-end; align-items: center; padding: 0 40px; position: relative; z-index: 10; flex-shrink: 0; }
        .top-bar::before {
            content: ''; position: absolute; top: -12px; left: -12px; right: -12px; bottom: -18px;
            background-image: url('/Picture/Logo_bar.png'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; z-index: -1;
        }
        .top-icons { display: flex; gap: 25px; align-items: center; }
        .top-icons i { font-size: 28px; color: #111; cursor: pointer; transition: color 0.3s ease; }
        .hero-banner { background-image: url('/Picture/Background.png'); background-size: cover; background-position: center; height: 140px; flex-shrink: 0; position: relative; display: flex; justify-content: center; padding-top: 15px; }
        .hero-banner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.2); z-index: 1; }
        .nav-bar { position: relative; z-index: 2; display: flex; width: 95%; max-width: 1368px; background-color: #e5deb5; border-radius: 12px; height: 45px; box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15); overflow: hidden; }
        .nav-item { flex: 1; display: flex; justify-content: center; align-items: center; text-decoration: none; color: #222; font-weight: 600; font-size: 16px; transition: background-color 0.3s; border-right: 1px solid rgba(0, 0, 0, 0.05); }
        .nav-item:hover { background-color: #d6cc9c; }
        .nav-item.active { background-color: #c0ab7b; color: #111; }
        .main-content { flex: 1; background-color: #ffffff; padding: 20px 40px; overflow-y: auto; }
        /* Reuse other styles from base.html ... (truncated for brevity in file create) */
    </style>
    <!-- Placeholder for extra CSS from pages -->
    <th:block layout:fragment="extra-css"></th:block>
</head>

<body>
    <div id="app-container">
        <header class="top-bar">
            <div class="top-icons">
                <i class="fa-regular fa-user" title="Tài khoản người dùng" onclick="openUserInfo()"></i>
                <i class="fa-solid fa-arrow-right-from-bracket" title="Đăng xuất" onclick="toggleLogoutPopup()"></i>
            </div>
        </header>

        <div class="hero-banner">
            <nav class="nav-bar">
                <a th:href="@{/tong-quan}" class="nav-item" th:classappend="${currentPage == 'tongquan' ? 'active' : ''}">Tổng quan</a>
                <a th:href="@{/dat-phong}" class="nav-item" th:classappend="${currentPage == 'datphong' ? 'active' : ''}">Đặt phòng</a>
                <a th:href="@{/quan-ly-dat-phong}" class="nav-item" th:classappend="${currentPage == 'qldatphong' ? 'active' : ''}">Quản lý đặt phòng</a>
                <a th:href="@{/nhan-phong}" class="nav-item" th:classappend="${currentPage == 'nhanphong' ? 'active' : ''}">Nhận phòng</a>
                <a href="#" class="nav-item">Trả phòng</a>
                <a th:href="@{/dich-vu}" class="nav-item" th:classappend="${currentPage == 'dichvu' ? 'active' : ''}">Dịch vụ phòng</a>
            </nav>
        </div>

        <main class="main-content" layout:fragment="content">
            <!-- Content will be injected here -->
        </main>
    </div>

    <!-- Modals (Logout, User Info, etc. from base.html) -->
    <div th:replace="~{fragments/modals :: logout}"></div>
    <div th:replace="~{fragments/modals :: user-info}"></div>

    <script src="/shared.js"></script>
    <th:block layout:fragment="extra-js"></th:block>
</body>
</html>
